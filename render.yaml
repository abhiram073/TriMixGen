services:
  # Backend API Service
  - type: web
    name: trimixgen-backend
    env: python
    buildCommand: pip install -r requirements-prod.txt
    startCommand: uvicorn backend.app:app --host 0.0.0.0 --port $PORT
    plan: standard # production: use 'standard' (2GB RAM) for full models
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DEMO_MODE
        value: "false" # Use real model in production; disable demo mode
      - key: BACKEND_CORS_ORIGINS
        value: "https://your-frontend-domain" # Replace with your frontend URL in production

  # Frontend Static Site
  - type: web
    name: trimixgen-frontend
    env: node
    buildCommand: cd frontend && npm install --legacy-peer-deps && npm run build
    startCommand: npx serve -s frontend/dist -l $PORT
    rootDir: .
