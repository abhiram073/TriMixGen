services:
  # Backend API Service
  - type: web
    name: trimixgen-backend
    env: python
    buildCommand: pip install -r requirements-prod.txt
    startCommand: uvicorn backend.app:app --host 0.0.0.0 --port $PORT
    plan: starter
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"

      # Core backend settings
      - key: DEMO_MODE
        value: "true"
      - key: USE_MOCK_LID
        value: "true"
        
      # Cache settings (safe to keep)
      - key: HF_HOME
        value: /opt/hf_cache
      - key: TRANSFORMERS_CACHE
        value: /opt/hf_cache

      # This points to the frontend service defined below
      - key: BACKEND_CORS_ORIGINS
        value: "https://trimixgen-frontend.onrender.com"

  # Frontend Service
  - type: web
    name: trimixgen-frontend
    env: node
    rootDir: frontend
    buildCommand: npm ci --legacy-peer-deps && npm run build
    startCommand: npx serve -s dist -l $PORT
    envVars:
      # This points to the backend service defined above
      - key: VITE_API_BASE_URL
        value: "https://trimixgen-backend.onrender.com"
