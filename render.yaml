services:
  # Backend API Service
  - type: web
    name: trimixgen-backend
    env: python
    buildCommand: pip install -r requirements-prod.txt
    startCommand: uvicorn backend.app:app --host 0.0.0.0 --port $PORT
    plan: starter # ⚠️ Change to 'standard' (2GB RAM) for production use of full models
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DEMO_MODE
        value: "true" # Uses lightweight DemoGenerator instead of mT5
      - key: BACKEND_CORS_ORIGINS
        value: "*" # Update this with frontend URL for production

  # Frontend Static Site
  - type: web
    name: trimixgen-frontend
    env: node
    buildCommand: cd frontend && npm run build
    startCommand: npx serve -s frontend/dist -l $PORT
    rootDir: .
