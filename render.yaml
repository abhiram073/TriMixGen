services:
  # Unified API & Frontend Service
  - type: web
    name: trimixgen-service
    env: python
    buildCommand: pip install -r requirements-prod.txt && cd frontend && npm ci --legacy-peer-deps && npm run build && cd ..
    startCommand: uvicorn backend.app:app --host 0.0.0.0 --port $PORT
    plan: starter
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: NODE_VERSION
        value: "20.10.0"

      # Core backend settings
      - key: DEMO_MODE
        value: "true"
      - key: USE_MOCK_LID
        value: "true"
        
      # Cache settings
      - key: HF_HOME
        value: /opt/hf_cache
      - key: TRANSFORMERS_CACHE
        value: /opt/hf_cache

      # CORS is no longer strictly needed since frontend and backend share the same origin,
      # but it's kept as a wildcard or just the self-origin just in case.
      - key: BACKEND_CORS_ORIGINS
        value: "*"
